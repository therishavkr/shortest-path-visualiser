services:
  api:
    build: .
    ports:
      - "8002:8000"
    environment:
      - CORS_ORIGINS=http://localhost:5174
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - api
